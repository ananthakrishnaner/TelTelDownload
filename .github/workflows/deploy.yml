name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Override image tag (default: short SHA of the running commit). Leave empty to use the workflow run commit.'
        required: false
        default: ''
        type: string
      reason:
        description: 'Why are you triggering this manually? (logged)'
        required: false
        default: 'manual run'
        type: string

# Required for ghcr.io push from the `build` job.
permissions:
  contents: read
  packages: write

# Shared config — image registry, names, app dir on the server.
env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}        # ananthakrishnaner
  BACKEND_IMAGE: teltel-backend
  FRONTEND_IMAGE: teltel-frontend
  INDEXER_IMAGE: teltel-indexer
  REMOTE_DIR: TelTelDownload
  # Resolved per-job: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/<name>:<tag>

jobs:
  # ---------------------------------------------------------------
  # 1) build — compile, lint, and push versioned images to ghcr.io
  # ---------------------------------------------------------------
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      backend_tag: ${{ steps.meta-backend.outputs.version }}
      frontend_tag: ${{ steps.meta-frontend.outputs.version }}
      indexer_tag: ${{ steps.meta-indexer.outputs.version }}
      backend_image: ${{ steps.meta-backend.outputs.name }}:${{ steps.meta-backend.outputs.version }}
      frontend_image: ${{ steps.meta-frontend.outputs.name }}:${{ steps.meta-frontend.outputs.version }}
      indexer_image: ${{ steps.meta-indexer.outputs.name }}:${{ steps.meta-indexer.outputs.version }}
      short_sha: ${{ steps.short-sha.outputs.sha }}
      trigger: ${{ steps.trigger.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve short SHA
        id: short-sha
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Resolve trigger
        id: trigger
        run: |
          REASON='${{ inputs.reason || '' }}'
          OVERRIDE='${{ inputs.tag_override || '' }}'
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            echo "name=manual (workflow_dispatch) — ${REASON}" >> "$GITHUB_OUTPUT"
          else
            echo "name=push to main" >> "$GITHUB_OUTPUT"
          fi
          # If the operator passed a tag override, use it; otherwise
          # we'll use the commit SHA in the meta step.
          if [ -n "$OVERRIDE" ]; then
            echo "override=$OVERRIDE" >> "$GITHUB_OUTPUT"
          else
            echo "override=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            ${{ steps.trigger.outputs.override && format('type=raw,value={0}', steps.trigger.outputs.override) || '' }}
          flavor: latest=auto

      - name: Compute frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            ${{ steps.trigger.outputs.override && format('type=raw,value={0}', steps.trigger.outputs.override) || '' }}
          flavor: latest=auto

      - name: Compute indexer metadata
        id: meta-indexer
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.INDEXER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            ${{ steps.trigger.outputs.override && format('type=raw,value={0}', steps.trigger.outputs.override) || '' }}
          flavor: latest=auto

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          # ignore-error=true: a transient GHA cache-export failure
          # (e.g. "error writing layer blob: not_found") must NOT fail
          # the build. The image still pushes; we just lose the cache
          # hint for the next run.
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Build & push indexer
        uses: docker/build-push-action@v6
        with:
          context: ./indexer
          push: true
          tags: ${{ steps.meta-indexer.outputs.tags }}
          labels: ${{ steps.meta-indexer.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      # Belt-and-braces: validate the JS bundle outside Docker so a
      # broken build fails the workflow BEFORE we attempt a deploy.
      - name: Frontend — install deps
        working-directory: ./frontend
        run: npm ci

      - name: Frontend — lint
        working-directory: ./frontend
        run: npm run lint

      - name: Frontend — build
        working-directory: ./frontend
        run: npm run build

  # ---------------------------------------------------------------
  # 2) deploy — push to server, swap compose to new SHA, verify, with
  #    automatic rollback to the previous good state on any failure.
  # ---------------------------------------------------------------
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    environment: production
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        env:
          # All values are passed via the step-level `env:` block, and
          # selected for transfer to the remote script via `envs:` below.
          # See https://github.com/appleboy/ssh-action#pass-environment
          TRIGGER: ${{ needs.build.outputs.trigger }}
          GITHUB_SHA: ${{ github.sha }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          REMOTE_DIR: ${{ env.REMOTE_DIR }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_OWNER: ${{ env.IMAGE_OWNER }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          INDEXER_IMAGE: ${{ env.INDEXER_IMAGE }}
          BACKEND_TAG: ${{ needs.build.outputs.backend_tag }}
          FRONTEND_TAG: ${{ needs.build.outputs.frontend_tag }}
          INDEXER_TAG: ${{ needs.build.outputs.indexer_tag }}
          # Used to write the host-side .env that compose interpolates.
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          # Use the existing SERVER_PASSWORD secret (no setup needed).
          # When the user adds SSH_PRIVATE_KEY later, switch to `key:`
          # and remove `password` for stronger auth.
          password: ${{ secrets.SERVER_PASSWORD }}
          # Don't pull host keys into the action's keyring; we trust
          # the deployment host. Override with `known_hosts` if you
          # need strict checking.
          command_timeout: 15m
          envs: TRIGGER,GITHUB_SHA,SHORT_SHA,REMOTE_DIR,REGISTRY,IMAGE_OWNER,BACKEND_IMAGE,FRONTEND_IMAGE,INDEXER_IMAGE,BACKEND_TAG,FRONTEND_TAG,INDEXER_TAG,ADMIN_USERNAME,ADMIN_PASSWORD
          script: |
            set -euo pipefail

            # NOTE: `set -x` is intentionally OFF. The `::group::` markers
            # below produce a clean, collapsible log. If you need to
            # debug a deploy, replace this line with `set -euxo pipefail`.

            # ============================================================
            # TelTel deploy log
            # ============================================================
            echo "::group::🚀 Deploy started"
            echo "  trigger     : $TRIGGER"
            echo "  commit      : $GITHUB_SHA"
            echo "  short SHA   : $SHORT_SHA"
            echo "  branch      : main"
            echo "  target dir  : ~/$REMOTE_DIR"
            echo "  backend img : $BACKEND_IMAGE:$BACKEND_TAG"
            echo "  frontend img: $FRONTEND_IMAGE:$FRONTEND_TAG"
            echo "  indexer img : $INDEXER_IMAGE:$INDEXER_TAG"
            echo "  started at  : $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            DEPLOY_START=$SECONDS
            echo "::endgroup::"

            cd "$HOME/${REMOTE_DIR}"

            # --- Write the host-side .env that docker-compose interpolates
            # for ${ADMIN_USERNAME}/${ADMIN_PASSWORD}. The previous
            # deploy relied on shell exports; this is more robust and
            # survives multiple deploys. ---
            echo "::group::[0/6] write .env (ADMIN_USERNAME, ADMIN_PASSWORD)"
            # Use printf with explicit \n so we don't need a heredoc —
            # a heredoc inside a YAML block scalar must be indented
            # the same as the rest of the block, and the EOF terminator
            # at column 1 closes the YAML scalar early, breaking the
            # workflow file. printf keeps everything in one line.
            printf 'ADMIN_USERNAME=%s\nADMIN_PASSWORD=%s\n' \
              "$ADMIN_USERNAME" "$ADMIN_PASSWORD" > .env
            echo "  ADMIN_USERNAME=$ADMIN_USERNAME"
            echo "  ADMIN_PASSWORD set (len ${#ADMIN_PASSWORD})"
            echo "::endgroup::"

            # --- Sync to the exact commit the workflow built. ---
            echo "::group::[1/6] git sync → $GITHUB_SHA"
            git fetch origin main
            git reset --hard origin/main
            echo "  HEAD: $(git log -1 --format='%H %s')"
            echo "::endgroup::"

            # --- Snapshot the currently-running image tags so we
            # know what to fall back to if the new deploy fails. ---
            echo "::group::[2/6] snapshot previous state"
            PREV_BACKEND="$(docker inspect --format '{{ index .Config.Image }}' teltel_backend 2>/dev/null || echo '<none>')"
            PREV_FRONTEND="$(docker inspect --format '{{ index .Config.Image }}' teltel_frontend 2>/dev/null || echo '<none>')"
            PREV_INDEXER="$(docker inspect --format '{{ index .Config.Image }}' teltel_indexer 2>/dev/null || echo '<none>')"
            PREV_SHA="$(git log -1 --format=%H HEAD~1 2>/dev/null || echo unknown)"
            echo "  previous backend  : $PREV_BACKEND"
            echo "  previous frontend : $PREV_FRONTEND"
            echo "  previous indexer  : $PREV_INDEXER"
            echo "  previous compose  : docker-compose.yml.bak.$PREV_SHA"
            echo "::endgroup::"

            # --- Save a backup of the *current* compose file so we
            # can roll back to the previous build via simple copy. ---
            echo "::group::[3/6] backup compose + patch to SHA"
            cp docker-compose.yml "docker-compose.yml.bak.$PREV_SHA"
            echo "  backed up → docker-compose.yml.bak.$PREV_SHA"

            BACKEND_REF="$REGISTRY/$IMAGE_OWNER/$BACKEND_IMAGE:$BACKEND_TAG"
            FRONTEND_REF="$REGISTRY/$IMAGE_OWNER/$FRONTEND_IMAGE:$FRONTEND_TAG"
            INDEXER_REF="$REGISTRY/$IMAGE_OWNER/$INDEXER_IMAGE:$INDEXER_TAG"
            sed -i "s|^    build: \./backend\$|    image: $BACKEND_REF|" docker-compose.yml
            sed -i "s|^    build: \./frontend\$|    image: $FRONTEND_REF|" docker-compose.yml
            sed -i "s|^    build: \./indexer\$|    image: $INDEXER_REF|" docker-compose.yml
            echo "  backend  → $BACKEND_REF"
            echo "  frontend → $FRONTEND_REF"
            echo "  indexer  → $INDEXER_REF"
            echo "  --- resulting image/build lines ---"
            grep -E '^\s+(image|build):' docker-compose.yml || true
            echo "::endgroup::"

            # --- Apply the new stack. We pull first so the up step
            # is fast and we surface registry errors immediately. ---
            echo "::group::[4/6] docker-compose pull"
            docker-compose pull
            echo "::endgroup::"

            # --- Workaround for docker-compose 1.29.2 ContainerConfig bug.
            # When a service is pulled from a registry (not built locally),
            # 1.29.2 reads the OLD container's image_config which lacks the
            # 'ContainerConfig' key, and crashes with:
            #   KeyError: 'ContainerConfig'  in get_container_data_volumes
            # Remove the affected containers first so up has to recreate
            # them from scratch instead of trying to converge.
            echo "::group::[5/6] docker-compose up -d"
            for c in teltel_backend teltel_frontend teltel_indexer; do
              if docker ps -a --format '{{.Names}}' | grep -q "^${c}\$"; then
                echo "  removing old $c (workaround for compose 1.29.2 ContainerConfig bug)"
                docker rm -f "$c" 2>/dev/null || true
              fi
            done
            # Also drop the orphan network and any stale container refs
            # so compose doesn't try to re-converge an old image.
            docker-compose down --remove-orphans 2>/dev/null || true
            docker-compose up -d
            echo "  --- container status immediately after up ---"
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
            echo "::endgroup::"

            # --- Poll /api/ready through nginx (port 80 -> 443) for up
            # to 60 seconds. The backend container is not published on
            # the host (only nginx has 80/443), so we have to go
            # through nginx, which proxies /api/* to the backend.
            echo "::group::[6/6] health-gate (polling https://localhost/api/ready up to 60s)"
            READY=0
            for i in $(seq 1 20); do
              sleep 3
              CODE="$(curl -sk -o /dev/null -w '%{http_code}' https://localhost/api/ready || echo 000)"
              echo "  [$i/20] $(date -u +%H:%M:%S)Z  /api/ready → HTTP $CODE"
              if [ "$CODE" = "200" ]; then
                READY=1
                break
              fi
            done
            echo "::endgroup::"

            if [ "$READY" -ne 1 ]; then
              echo "::group::🩺 Health gate FAILED — /api/ready never returned 200 (no rollback, by request)"
              echo "  --- container status ---"
              docker ps -a --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' || true
              echo "  --- last 80 lines of backend log ---"
              docker logs --tail 80 teltel_backend 2>&1 || true
              echo "  --- last 30 lines of frontend log ---"
              docker logs --tail 30 teltel_frontend 2>&1 || true
              echo "  --- last 30 lines of indexer log ---"
              docker logs --tail 30 teltel_indexer 2>&1 || true
              echo "  --- last 30 lines of nginx log ---"
              docker logs --tail 30 teltel_nginx 2>&1 || true
              echo "  --- direct probe to backend inside the docker net ---"
              docker exec teltel_nginx sh -c "wget -q -O- http://teltel_backend:5000/api/ready 2>&1 || echo 'wget failed: $?'" || true
              echo "::endgroup::"
              echo "::error::Health gate FAILED — backend never came up. New image is live; investigate logs above."
              exit 1
            fi

            # --- Non-blocking second poll: /api/ready-strict also checks
            # the Rust indexer container. The indexer being slow to start
            # does NOT fail the deploy (the backfill will catch any unindexed
            # videos) — we just log a warning if it never comes up. Flip the
            # exit-1 to a hard gate later if you want a stricter rollout. ---
            echo "::group::[7/6] non-blocking poll: /api/ready-strict (indexer)"
            STRICT_READY=0
            for i in $(seq 1 10); do
              sleep 2
              BODY="$(curl -sk https://localhost/api/ready-strict || echo '')"
              if echo "$BODY" | grep -q '"ready":true'; then
                STRICT_READY=1
                echo "  [$i/10] $(date -u +%H:%M:%S)Z  /api/ready-strict → 200 (indexer OK)"
                break
              fi
              echo "  [$i/10] $(date -u +%H:%M:%S)Z  /api/ready-strict → not yet"
            done
            if [ "$STRICT_READY" -ne 1 ]; then
              echo "  ⚠️  /api/ready-strict never returned 200; indexer may be slow to start. Not failing the deploy."
              docker logs --tail 30 teltel_indexer 2>&1 || true
            fi
            echo "::endgroup::"

            # --- Record the new "previous" tags for the *next* deploy. ---
            echo "$PREV_BACKEND"  > ~/teltel-prev-backend.txt
            echo "$PREV_FRONTEND" > ~/teltel-prev-frontend.txt
            echo "$PREV_INDEXER"  > ~/teltel-prev-indexer.txt

            # --- Final summary for the Actions log. ---
            echo "::group::✅ Deploy $SHORT_SHA succeeded"
            echo "  duration   : $((SECONDS - DEPLOY_START))s"
            echo "  finished at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "  --- running containers ---"
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
            echo "  --- last 30 lines of backend log ---"
            docker logs --tail 30 teltel_backend || true
            echo "  --- last 30 lines of indexer log ---"
            docker logs --tail 30 teltel_indexer || true
            echo "  --- last 15 lines of nginx log ---"
            docker logs --tail 15 teltel_nginx || true
            echo "::endgroup::"
