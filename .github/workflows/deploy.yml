name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Configure Firewall
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw allow 22/tcp
            ufw --force enable
            
            # Deploy Application
            cd TelTelDownload
            git pull origin main
            echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" > .env
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            # Bypass docker-compose 1.29.2 ContainerConfig bug by removing all old containers first
            docker-compose down --remove-orphans || true
            docker ps -aq | xargs -r docker rm -f || true
            
            docker-compose up -d --build
            
            # Print status to the deployment log
            echo "--- Verifying Container Status ---"
            docker ps
            
            echo "--- Waiting for Containers to Initialize (15s) ---"
            sleep 15
            
            echo "--- Nginx Logs ---"
            docker logs --tail 30 teltel_nginx
            
            echo "--- Backend Initialization Logs ---"
            docker logs --tail 50 teltel_backend
            
            echo "--- Frontend Initialization Logs ---"
            docker logs --tail 30 teltel_frontend
            
            # Check if backend crashed
            BACKEND_STATUS=$(docker inspect -f '{{.State.Status}}' teltel_backend)
            if [ "$BACKEND_STATUS" != "running" ]; then
              echo "CRITICAL ERROR: Backend container crashed or failed to start!"
              exit 1
            fi
