name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Configure Firewall
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw allow 22/tcp
            ufw --force enable
            
            # Deploy Application
            cd TelTelDownload
            git pull origin main
            echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" > .env
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
            # Bypass docker-compose 1.29.2 ContainerConfig bug by removing old containers first
            docker stop teltel_backend teltel_frontend teltel_nginx teltel_mongo || true
            docker rm teltel_backend teltel_frontend teltel_nginx teltel_mongo || true
            
            docker-compose up -d --build
            
            # Print status to the deployment log
            echo "--- Container Status ---"
            docker ps
            echo "--- Backend Logs (Waiting for MongoDB) ---"
            sleep 5
            docker logs --tail 20 teltel_backend
