version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: teltel_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: teltel_backend
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/teltel
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # pHash indexer (separate Rust container, see plan §Lookup)
      - INDEXER_URL=http://indexer:9000
      - INDEXER_MEDIA_DIR=/media
    volumes:
      - ./media_downloads:/usr/src/app/media_downloads
    depends_on:
      - mongodb
      - indexer
    restart: unless-stopped

  # ---- pHash indexer (Rust, separate container, no public port) ---------
  # Reachable on the default compose net only as http://indexer:9000.
  # The Node backend is the only thing that talks to it; nginx and the
  # public internet never see it.
  indexer:
    build: ./indexer
    container_name: teltel_indexer
    environment:
      - PORT=9000
      - MEDIA_DIR=/media
      - MONGO_URI=mongodb://mongodb:27017/teltel
      - INDEXER_HAMMING_THRESHOLD=12
      - INDEXER_FRAMES_PER_VIDEO=5
      - INDEXER_REFRESH_SECS=30
      - RUST_LOG=info
    volumes:
      - ./media_downloads:/media
    depends_on:
      - mongodb
    restart: unless-stopped
    # NOTE: no `ports:` — internal only.

  frontend:
    build: ./frontend
    container_name: teltel_frontend
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: teltel_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
