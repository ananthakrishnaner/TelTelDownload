server {
    listen 80;
    server_name telegram.ananthakrishnan.icu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name telegram.ananthakrishnan.icu;

    ssl_certificate /etc/letsencrypt/live/telegram.ananthakrishnan.icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/telegram.ananthakrishnan.icu/privkey.pem;

    # Raise body size for image-based reverse-search uploads (see plan §Lookup).
    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        # Search queries can take 5-15s while the indexer matches; raise the timeout.
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /media/ {
        proxy_pass http://backend:5000/media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /socket.io/ {
        proxy_pass http://backend:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend:5173/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
